# Schema for IDEA:
# $schema: https://schema.golem.cloud/app/golem/1.5.0/golem.schema.json
# Schema for vscode-yaml:
# yaml-language-server: $schema=https://schema.golem.cloud/app/golem/1.5.0/golem.schema.json

# Field reference: https://learn.golem.cloud/app-manifest#field-reference
# Creating HTTP APIs: https://learn.golem.cloud/invoke/making-custom-apis

manifestVersion: 1.5.0

app: agents

environments:
  local:
    server: local
    componentPresets: debug
  cloud:
    server: cloud
    componentPresets: release

componentTemplates:
  my-moonbit:
    presets:
      debug:
        default: true
        build:
          - command: ./.mooncakes/golemcloud/golem_sdk_tools/golem-sdk-tools reexports .mooncakes/golemcloud/golem_sdk {{ componentDir }}
            dir: "{{ appRootDir }}"
          - command: ./.mooncakes/golemcloud/golem_sdk_tools/golem-sdk-tools agents {{ appRootDir }}
            dir: "{{ appRootDir }}"
          - command: moon build --target wasm
            dir: "{{ appRootDir }}"
          - command: wasm-tools component embed .mooncakes/golemcloud/golem_sdk/wit {{ appRootDir }}/_build/wasm/debug/build/{{ moonbitBuildPackagePath }} --encoding utf16 --output {{ appRootDir }}/_build/wasm/debug/{{ componentName | to_snake_case }}.embed.wasm
            dir: "{{ appRootDir }}"
            mkdirs:
              - "{{ appRootDir }}/_build/wasm/debug"
          - command: wasm-tools component new {{ appRootDir }}/_build/wasm/debug/{{ componentName | to_snake_case }}.embed.wasm --output {{ appRootDir }}/_build/wasm/debug/{{ componentName | to_snake_case }}.agent.wasm
        componentWasm: "{{ appRootDir }}/_build/wasm/debug/{{ componentName | to_snake_case }}.agent.wasm"
      release:
        build:
          - command: ./.mooncakes/golemcloud/golem_sdk_tools/golem-sdk-tools reexports .mooncakes/golemcloud/golem_sdk {{ componentDir }}
            dir: "{{ appRootDir }}"
          - command: ./.mooncakes/golemcloud/golem_sdk_tools/golem-sdk-tools agents {{ appRootDir }}
            dir: "{{ appRootDir }}"
          - command: moon build --target wasm --release
            dir: "{{ appRootDir }}"
          - command: wasm-tools component embed .mooncakes/golemcloud/golem_sdk/wit {{ appRootDir }}/_build/wasm/release/build/{{ moonbitBuildPackagePath }} --encoding utf16 --output {{ appRootDir }}/_build/wasm/release/{{ componentName | to_snake_case }}.embed.wasm
            dir: "{{ appRootDir }}"
            mkdirs:
              - "{{ appRootDir }}/_build/wasm/release"
          - command: wasm-tools component new {{ appRootDir }}/_build/wasm/release/{{ componentName | to_snake_case }}.embed.wasm --output {{ appRootDir }}/_build/wasm/release/{{ componentName | to_snake_case }}.agent.wasm
        componentWasm: "{{ appRootDir }}/_build/wasm/release/{{ componentName | to_snake_case }}.agent.wasm"

components:
  app:admin-agent:
    dir: "app-admin-agent"
    templates: my-moonbit
  app:gateway-agent:
    dir: "app-gateway-agent"
    templates: my-moonbit
  app:student-agent:
    dir: "app-student-agent"
    templates: my-moonbit
  app:teacher-agent:
    dir: "app-teacher-agent"
    templates: my-moonbit

httpApi:
  deployments:
    local:
      - domain: agents.localhost:9006
        agents:
          CounterAgent: {}
          WorkflowAgent: {}
          HumanAgent: {}
          TaskAgent: {}
          CounterWithSnapshotAgent: {}
